    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Breathing App</title>
      <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { background: #4A90E2; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; margin-top: 20px; }
        h1 { font-size: 36px; margin-bottom: 20px; }
      </style>
    </head>
    <body>
      <h1>🌬️ Breathing App</h1>
      <button onclick="startBreathing()">▶ Start Breathing</button>
      <script>
        function startBreathing() {
          alert("Breathe in for 4 seconds...");
          setTimeout(() => alert("Hold for 7 seconds..."), 4000);
          setTimeout(() => alert("Exhale for 8 seconds..."), 11000);
        }
      </script>
    </body>
